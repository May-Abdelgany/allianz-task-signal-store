<div class="max-w-6xl mx-auto mb-10">
  <div
    class="bg-white/70 backdrop-blur-md shadow-xl rounded-2xl p-6 flex justify-between items-center border border-gray-200 min-h-[90px]"
  >
    <div class="flex-1">
      <p class="text-gray-500 text-sm">Routine Difficulty</p>

      @defer (when totalSaltos() !== undefined) {
        <h1 class="text-2xl font-bold text-gray-800">
          Total
          <span class="text-indigo-600 inline-block min-w-[3ch] text-center tabular-nums">
            {{ totalSaltos() }}
          </span>
        </h1>
      } @placeholder {
        <!-- skeleton placeholder -->
        <h1 class="text-2xl font-bold text-gray-800 opacity-20">
          Total
          <span class="text-indigo-600 inline-block min-w-[3ch] text-center tabular-nums">
            0
          </span>
        </h1>
      }
    </div>

    <button
      class="cursor-pointer bg-red-500 hover:bg-red-600 text-white w-10 h-10 rounded-xl flex items-center justify-center shadow shrink-0"
      (click)="resetBoxes()"
    >
      ✕
    </button>
  </div>
</div>
